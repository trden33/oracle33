<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORACLE • 33</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Instrument+Sans:wght@400;500&amp;display=swap');

    :root {
      --gold: #c9a36b;
      --deep: #0f0c1f;
    }

    body {
      font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
    }

    .heading-serif {
      font-family: 'Playfair Display', Georgia, serif;
      font-feature-settings: "tnum";
    }

    .mystical-bg {
      background: radial-gradient(circle at 50% 20%, #1a1633 0%, #0f0c1f 45%, #0a0818 100%);
    }

    .starfield {
      background-image: 
        radial-gradient(1.5px 1.5px at 20px 30px, rgba(201, 163, 107, 0.25) 50%, transparent 100%),
        radial-gradient(1px 1px at 80px 120px, rgba(255,255,255,0.2) 50%, transparent 100%),
        radial-gradient(1px 1px at 160px 60px, rgba(255,255,255,0.15) 50%, transparent 100%),
        radial-gradient(1.2px 1.2px at 240px 200px, rgba(201, 163, 107, 0.18) 50%, transparent 100%),
        radial-gradient(1px 1px at 320px 90px, rgba(255,255,255,0.22) 50%, transparent 100%);
      background-size: 380px 280px;
      animation: twinkle 8s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    .oracle-card {
      width: 270px;
      height: 400px;
      cursor: pointer;
    }

    .deck-card {
      box-shadow: 0 20px 55px -12px rgb(0 0 0 / 0.55),
                  0 8px 25px -8px rgb(0 0 0 / 0.45);
      transition: transform 0.2s cubic-bezier(0.23, 1.0, 0.32, 1), 
                  box-shadow 0.2s ease;
    }

    .deck-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 28px 65px -10px rgb(0 0 0 / 0.6),
                  0 12px 30px -8px rgb(0 0 0 / 0.5);
    }

    /* Make sure absolute children inside the static left deck are contained */
    .deck-card {
      position: relative;
    }

    /* Light elegant awaiting card for the right position (matches the clean "two cards" look) */
    .right-back {
      background: linear-gradient(165deg, #f8f4e9 0%, #f1e9d9 100%);
      border: 1px solid #d4c8a8;
      box-shadow: inset 0 0 0 1px #e8dcc4;
    }
    .right-back::before {
      content: '';
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(201, 163, 107, 0.22);
      border-radius: 10px;
    }

    /* Static deck back for left side (no absolute face positioning) */
    .static-deck-back {
      background: linear-gradient(145deg, #16132a 0%, #0f0c1f 100%);
      border: 1px solid #2a2545;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .static-deck-back::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(201, 163, 107, 0.25);
      border-radius: 12px;
    }

    .oracle-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      box-shadow: 0 25px 70px -15px rgb(0 0 0 / 0.5),
                  0 10px 30px -10px rgb(0 0 0 / 0.4);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
    }

    /* Right card starts with the light back visible; front is hidden until revealed flat */
    #oracle-card .card-front {
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #oracle-card.card-revealed .card-front {
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    #oracle-card .right-back {
      transition: opacity 0.35s ease;
    }
    #oracle-card.card-revealed .right-back {
      opacity: 0;
      pointer-events: none;
    }

    .card-back {
      background: linear-gradient(145deg, #16132a 0%, #0f0c1f 100%);
      border: 1px solid #2a2545;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(201, 163, 107, 0.25);
      border-radius: 12px;
    }

    .card-back::after {
      content: '';
      position: absolute;
      inset: 26px;
      background: 
        radial-gradient(circle at 30% 30%, rgba(201,163,107,0.07) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(201,163,107,0.06) 0%, transparent 55%);
      border-radius: 10px;
    }

    .card-front {
      background: linear-gradient(165deg, #f8f4e9 0%, #f1e9d9 100%);
      color: #2c2520;
      border: 1px solid #d4c8a8;
      box-shadow: inset 0 0 0 1px #e8dcc4;
    }

    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(to bottom, rgba(201,163,107,0.06) 0%, transparent 18%),
        linear-gradient(to top, rgba(140, 110, 70, 0.035) 0%, transparent 22%);
      pointer-events: none;
    }

    .gold-border {
      position: absolute;
      inset: 11px;
      border: 1px solid #c9a36b;
      border-radius: 12px;
      opacity: 0.45;
    }

    .inner-border {
      position: absolute;
      inset: 19px;
      border: 1px solid #b89a66;
      border-radius: 8px;
      opacity: 0.25;
    }

    .ornate-corner {
      position: absolute;
      width: 38px;
      height: 38px;
      border: 1px solid #c9a36b;
      opacity: 0.35;
    }

    .ornate-corner.tl { top: 22px; left: 22px; border-right: none; border-bottom: none; border-top-left-radius: 4px; }
    .ornate-corner.tr { top: 22px; right: 22px; border-left: none; border-bottom: none; border-top-right-radius: 4px; }
    .ornate-corner.bl { bottom: 22px; left: 22px; border-right: none; border-top: none; border-bottom-left-radius: 4px; }
    .ornate-corner.br { bottom: 22px; right: 22px; border-left: none; border-top: none; border-bottom-right-radius: 4px; }

    .card-title {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: -0.02em;
    }

    .symbol-circle {
      width: 108px;
      height: 108px;
      background: radial-gradient(circle at 45% 35%, #f8f4e9, #e8dcc4 60%, #d9c9a3 100%);
      box-shadow: 
        inset 0 4px 12px rgba(255,255,255,0.9),
        inset 0 -8px 18px rgba(140,110,70,0.2),
        0 4px 14px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .symbol-circle::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 9999px;
      border: 1px solid #c9a36b;
      opacity: 0.3;
    }

    .oracle-glow {
      box-shadow: 0 0 0 1px rgba(201, 163, 107, 0.2),
                  0 10px 50px -15px rgb(201 163 107 / 0.25);
    }

    /* The right card frame is always static in place on the right.
       We crossfade the interior (#card-content) between awaiting state and full card. */

    .interpretation {
      animation: interpretationEnter 0.7s cubic-bezier(0.23, 1.0, 0.32, 1) both;
    }

    @keyframes interpretationEnter {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-text {
      line-height: 1.55;
    }

    .sacred {
      filter: drop-shadow(0 2px 3px rgb(0 0 0 / 0.15));
    }

    .deck-label {
      font-size: 10px;
      letter-spacing: 3px;
      font-weight: 500;
    }

    .draw-button {
      transition: all 0.2s cubic-bezier(0.23, 1.0, 0.32, 1);
    }

    .draw-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px -8px rgb(201 163 107 / 0.35);
    }

    .subtle-text {
      color: #6b5f52;
    }
  </style>
</head>
<body class="mystical-bg starfield min-h-screen text-white overflow-x-hidden">
  <!-- Header -->
  <div class="pt-10 pb-6 px-6">
    <div class="max-w-[720px] mx-auto flex items-center justify-between">
      <div>
        <div class="flex items-center gap-x-3">
          <div class="w-7 h-7 rounded-full border border-[#c9a36b] flex items-center justify-center">
            <i class="fa-solid fa-infinity text-[#c9a36b] text-sm"></i>
          </div>
          <div>
            <span class="text-3xl font-semibold tracking-tighter heading-serif text-[#e8d9b8]">ORACLE</span>
            <span class="text-[#c9a36b] text-sm font-medium tracking-[3px] ml-1">33</span>
          </div>
        </div>
      </div>
      <div class="text-right">
        <div class="text-[10px] text-[#c9a36b]/70 tracking-[2px]">DAILY GUIDANCE</div>
        <div id="today-date" class="text-xs text-[#a89d86] font-light"></div>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="max-w-[720px] mx-auto px-6 pb-12">
    <!-- Intro -->
    <div class="text-center mb-8">
      <h1 class="text-4xl tracking-tighter heading-serif text-[#e8d9b8] leading-none mb-2">One card.<br>One message.</h1>
      <p class="text-[#a89d86] text-[15px]">Draw from the deck. Receive your guidance.</p>
    </div>

    <!-- Two-Card Layout: Deck (left) + Drawn Card (right) -->
    <div class="flex justify-center mb-2">
      <div class="flex flex-col md:flex-row items-center md:items-start gap-7 md:gap-8">
        
        <!-- LEFT: Face-down Deck Card -->
        <div class="text-center">
          <div class="text-[10px] tracking-[2.5px] text-[#c9a36b]/70 mb-2">THE DECK</div>
          
          <div id="deck-card" onclick="drawCard()" 
               class="oracle-card deck-card">
            <!-- Static ornate deck back (left side) -->
            <div class="static-deck-back flex flex-col items-center justify-center p-7 w-full h-full">
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="relative w-36 h-36 flex items-center justify-center">
                  <div class="absolute w-36 h-36 rounded-full border border-[#c9a36b]/30"></div>
                  <div class="absolute w-[110px] h-[110px] rounded-full border border-[#c9a36b]/25"></div>
                  <div class="absolute w-[78px] h-[78px] rounded-full border border-[#c9a36b]/20"></div>
                  
                  <div class="relative w-14 h-14">
                    <svg width="56" height="56" viewBox="0 0 64 64" class="text-[#c9a36b]/70">
                      <circle cx="32" cy="32" r="5" fill="currentColor" opacity="0.6"/>
                      <g fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.55">
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14"/>
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14" transform="rotate(60 32 32)"/>
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14" transform="rotate(120 32 32)"/>
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14" transform="rotate(180 32 32)"/>
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14" transform="rotate(240 32 32)"/>
                        <path d="M32 14 Q40 24 32 32 Q24 24 32 14" transform="rotate(300 32 32)"/>
                      </g>
                      <circle cx="32" cy="32" r="9" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
                    </svg>
                  </div>
                </div>
              </div>

              <div class="relative z-10 text-center">
                <div class="deck-label text-[#c9a36b] tracking-[4px] mb-0.5">THE DECK</div>
                <div class="text-[34px] leading-none font-semibold tracking-[-1.2px] heading-serif text-[#e8d9b8]">33</div>
                <div class="text-[9px] text-[#c9a36b]/55 tracking-[2px] mt-px">ORACLE CARDS</div>
              </div>

              <div class="absolute bottom-6 text-[9px] text-[#c9a36b]/45 tracking-[1.5px]">TAP TO DRAW</div>
            </div>
          </div>
        </div>

        <!-- RIGHT: The drawn / revealed card position -->
        <div class="text-center">
          <div class="text-[10px] tracking-[2.5px] text-[#c9a36b]/70 mb-2">YOUR ORACLE</div>
          
          <div class="relative">
            <!-- Ambient glow behind the right card -->
            <div id="card-glow" 
                 class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[260px] h-[260px] rounded-full bg-[#c9a36b] opacity-0 blur-[85px] transition-all duration-1000 pointer-events-none"></div>

            <!-- Right card (static frame on the right — content inside changes with pure opacity crossfade, no flip or motion on the card itself) -->
            <div id="oracle-card" class="oracle-card" onclick="handleDrawnCardClick()">
              <div id="card-content" class="w-full h-full">
                <!-- Initial awaiting state (light minimal card) -->
                <div class="right-back flex flex-col items-center justify-center p-8 relative w-full h-full">
                  <div class="absolute inset-0 flex items-center justify-center">
                    <div class="relative">
                      <!-- Soft concentric rings in gold on cream -->
                      <div class="w-20 h-20 rounded-full border border-[#c9a36b]/35"></div>
                      <div class="absolute inset-[7px] rounded-full border border-[#c9a36b]/22"></div>
                      <div class="absolute inset-[14px] rounded-full border border-[#c9a36b]/12"></div>
                      <!-- Small central mark -->
                      <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-[#c9a36b]/50"></div>
                      </div>
                    </div>
                  </div>
                  <div class="relative z-10 text-center">
                    <div class="text-[9px] tracking-[3px] text-[#b89a66]/60">—</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Interpretation / Message - Clean centered caption under the two-card dash -->
    <div id="interpretation" class="hidden mt-4 max-w-[580px] mx-auto text-center">
      <div class="pt-2">
        <!-- Very subtle centered header line -->
        <div class="flex items-center justify-center gap-x-3 mb-2">
          <div class="h-px w-6 bg-gradient-to-r from-transparent via-[#c9a36b]/45"></div>
          <div class="text-[9px] tracking-[2.8px] text-[#c9a36b]/60 font-medium">TODAY'S MESSAGE</div>
          <div class="h-px w-6 bg-gradient-to-l from-transparent via-[#c9a36b]/45"></div>
        </div>

        <!-- The main daily guidance text -->
        <div id="daily-message" 
             class="message-text text-[#d8d0b8] text-[14.5px] leading-relaxed max-w-[48ch] mx-auto">
        </div>

        <!-- Essence line, integrated lightly -->
        <div class="mt-3 flex items-center justify-center gap-x-2 text-[12px] text-[#a89d86]">
          <i class="fa-solid fa-feather text-[#c9a36b] text-xs"></i>
          <span id="essence"></span>
        </div>
      </div>

      <!-- Minimal buttons – low visual weight so focus stays on the two cards -->
      <div class="flex items-center justify-center gap-x-4 mt-4 text-[10px] tracking-wider">
        <button onclick="drawCard(true)"
                class="text-[#c9a36b] hover:text-[#d4af77] flex items-center gap-x-1.5 transition-colors active:opacity-70">
          <i class="fa-solid fa-sync-alt"></i>
          <span>DRAW ANOTHER</span>
        </button>
        <span class="text-[#c9a36b]/25">·</span>
        <button onclick="copyMessage()"
                class="text-[#c9a36b] hover:text-[#d4af77] flex items-center gap-x-1.5 transition-colors active:opacity-70">
          <i class="fa-solid fa-copy"></i>
          <span>SAVE MESSAGE</span>
        </button>
      </div>
    </div>
  </div>

  <div class="text-center pb-9">
    <div class="text-[10px] text-[#5c5344] tracking-widest">BREATHE • RECEIVE • TRUST</div>
  </div>

  <script>
    // Tailwind script configuration
    function initTailwind() {
      document.documentElement.style.setProperty('--accent', '#c9a36b');
    }

    // Set today's date
    function setTodayDate() {
      const el = document.getElementById('today-date');
      const date = new Date();
      const options = { month: 'long', day: 'numeric' };
      el.textContent = date.toLocaleDateString('en-US', options).toUpperCase();
    }

    // The 33 Oracle Cards
    const deck = [
      {
        id: 1,
        name: "THE DAWN",
        keyword: "Renewal",
        symbol: "🌅",
        svg: `<svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="34" cy="38" r="11" fill="#c9a36b" opacity="0.85"/>
          <path d="M22 38 L12 38" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M56 38 L46 38" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M27 27 L19 19" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M49 27 L57 19" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M34 20 L34 9" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M20 49 Q34 58 48 49" stroke="#c9a36b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>`,
        essence: "The first light after darkness. A clean slate is offered.",
        daily: "Today begins with quiet promise. Something long dormant is ready to stir. Move gently but deliberately — the smallest step you take this morning carries more weight than you know."
      },
      {
        id: 2,
        name: "THE MIRROR",
        keyword: "Reflection",
        symbol: "🪞",
        svg: `<svg width="62" height="68" viewBox="0 0 62 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="31" cy="23" rx="19" ry="13" stroke="#c9a36b" stroke-width="3"/>
          <path d="M22 35 L22 55 Q31 62 40 55 L40 35" stroke="#c9a36b" stroke-width="3"/>
          <circle cx="31" cy="23" r="6" fill="#c9a36b" opacity="0.4"/>
        </svg>`,
        essence: "You are being shown to yourself without judgment.",
        daily: "The day will reflect you back. Notice what irritates or delights you — these are clues. When you meet your own gaze honestly, the path forward becomes obvious."
      },
      {
        id: 3,
        name: "THE RIVER",
        keyword: "Flow",
        symbol: "🌊",
        svg: `<svg width="72" height="52" viewBox="0 0 72 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 26 Q18 14 34 26 Q50 38 68 26" stroke="#c9a36b" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M4 38 Q18 26 34 38 Q50 50 68 38" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
          <path d="M4 14 Q18 2 34 14 Q50 26 68 14" stroke="#c9a36b" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
        </svg>`,
        essence: "Surrender is not giving up. It is moving with what already wants to move.",
        daily: "Let the current carry you today. Resistance will only tire you. Trust that the river already knows the way — your only job is to stay afloat and steer lightly when needed."
      },
      {
        id: 4,
        name: "THE FLAME",
        keyword: "Courage",
        symbol: "🔥",
        svg: `<svg width="58" height="72" viewBox="0 0 58 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M29 6 Q16 26 22 42 Q29 56 29 66" stroke="#c9a36b" stroke-width="4" stroke-linecap="round"/>
          <path d="M29 6 Q42 26 36 42 Q29 56 29 66" stroke="#c9a36b" stroke-width="4" stroke-linecap="round"/>
          <path d="M23 30 Q29 38 35 30" stroke="#c9a36b" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>`,
        essence: "Your inner fire is not too much. It is exactly enough.",
        daily: "A moment will arrive today that asks you to stand in your full power. Do not shrink. Speak the truth you have been rehearsing in silence. The flame protects those who carry it openly."
      },
      {
        id: 5,
        name: "THE GARDEN",
        keyword: "Nurture",
        symbol: "🌱",
        svg: `<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M32 52 L32 24" stroke="#c9a36b" stroke-width="3"/>
          <circle cx="32" cy="18" r="7" fill="#c9a36b" opacity="0.7"/>
          <path d="M20 38 Q32 30 44 38" stroke="#c9a36b" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M17 46 Q32 38 47 46" stroke="#c9a36b" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
          <circle cx="32" cy="54" r="4" fill="#c9a36b" opacity="0.3"/>
        </svg>`,
        essence: "What you tend to with care will grow beyond expectation.",
        daily: "Tend to one small thing today with full presence — a conversation, a plant, your own body, a half-finished idea. The garden does not rush. Neither should you."
      },
      {
        id: 6,
        name: "THE KEY",
        keyword: "Opportunity",
        symbol: "🗝️",
        svg: `<svg width="44" height="70" viewBox="0 0 44 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="14" cy="14" r="10" stroke="#c9a36b" stroke-width="3.5"/>
          <path d="M22 20 L40 38" stroke="#c9a36b" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M33 33 L39 39" stroke="#c9a36b" stroke-width="3" stroke-linecap="round"/>
          <circle cx="14" cy="14" r="4" fill="#c9a36b"/>
        </svg>`,
        essence: "The door was never locked. You simply needed the right key.",
        daily: "Watch for the unexpected opening. It may arrive disguised as a coincidence or a casual invitation. Say yes before your mind finds reasons to hesitate."
      },
      {
        id: 7,
        name: "THE VEIL",
        keyword: "Intuition",
        symbol: "👁️",
        svg: `<svg width="66" height="46" viewBox="0 0 66 46" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="33" cy="23" rx="28" ry="16" stroke="#c9a36b" stroke-width="3"/>
          <circle cx="33" cy="23" r="7" fill="#c9a36b" opacity="0.85"/>
          <path d="M12 23 Q33 10 54 23" stroke="#c9a36b" stroke-width="1.5" opacity="0.4"/>
        </svg>`,
        essence: "You already know. You are simply learning to trust what you know.",
        daily: "Your body will tell you the truth today before your mind catches up. Pay attention to the subtle tightening or the soft expansion in your chest. That is your compass."
      },
      {
        id: 8,
        name: "THE ANCHOR",
        keyword: "Grounding",
        symbol: "⚓",
        svg: `<svg width="52" height="68" viewBox="0 0 52 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M26 6 L26 42" stroke="#c9a36b" stroke-width="4" stroke-linecap="round"/>

    // Get a card (optionally seeded by date for "today's card")
    function getCard(useDailySeed = false) {
      if (useDailySeed) {
        const today = new Date();
        const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
        const index = seed % deck.length;
        return deck[index];
      }
      // Pure random
      return deck[Math.floor(Math.random() * deck.length)];
    }

            <!-- Bottom subtle cue -->
            <div class="text-center">
              <div class="inline-flex items-center gap-x-1 text-[9px] text-[#b89a66]/70">
                <i class="fa-solid fa-circle text-[3.5px]"></i>
                <span class="tracking-wider">FOR YOUR DAY</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // Main draw function
    let currentCard = null;
    let hasDrawn = false;

    function drawCard(forceNew = false) {
      const cardEl = document.getElementById('oracle-card');
      const interpretation = document.getElementById('interpretation');
      const glow = document.getElementById('card-glow');

      // Pick card
      const isFirstDraw = !hasDrawn && !forceNew;
      currentCard = getCard(isFirstDraw); // First draw is "daily" seeded

      // Show glow behind the right card
      glow.style.opacity = '0.13';
      setTimeout(() => {
        glow.style.opacity = '0.08';
      }, 900);

      const cardContent = document.getElementById('card-content');

      if (isFirstDraw || !cardEl.classList.contains('card-revealed')) {
        // === FIRST REVEAL: The right card's outer frame and position on the right is 100% static.
        // We crossfade the *entire interior content* from the simple awaiting rings to the full card.
        // No rotation, no scale on the card, no "flip down from the centre".
        cardContent.style.transition = 'opacity 0.45s ease';
        cardContent.style.opacity = '0';

        setTimeout(() => {
          populateCardFront(currentCard);   // replaces the awaiting content with the full front

          cardContent.style.opacity = '1';

          // Trigger sound + message after the crossfade
          setTimeout(() => {
            playRevealSound();
            fadeInMessage(interpretation);
            cardEl.classList.add('card-revealed'); // just a marker so redraw knows it's revealed
            hasDrawn = true;
            if (navigator.vibrate) navigator.vibrate(8);
          }, 280);
        }, 40);
      } else {
        // === REDRAW: Outer card frame on the right never moves or changes at all.
        // Only the interior content gently dims, swaps, and fades back.
        cardContent.style.transition = 'opacity 0.2s ease';
        cardContent.style.opacity = '0.15';

        setTimeout(() => {
          populateCardFront(currentCard);

          cardContent.style.opacity = '1';

          setTimeout(() => {
            playRevealSound();
            fadeInMessage(interpretation);
            if (navigator.vibrate) navigator.vibrate(5);
          }, 160);
        }, 120);
      }
    }

    function fadeInMessage(el) {
      el.style.transition = 'none';
      el.style.opacity = '0';
      el.classList.remove('hidden');

      // Force reflow
      void el.offsetWidth;

      el.style.transition = 'opacity 0.45s cubic-bezier(0.23, 1.0, 0.32, 1)';
      el.style.opacity = '1';

      // Update the actual text content
      document.getElementById('daily-message').innerHTML = currentCard.daily;
      document.getElementById('essence').innerHTML = 
        `<span class="font-medium text-[#c9a36b]">${currentCard.keyword}.</span> ${currentCard.essence}`;
    }

    // Subtle magical chime on reveal
    function playRevealSound() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const o = audio.createOscillator();
        const g = audio.createGain();
        const f = audio.createBiquadFilter();

        o.type = 'sine';
        o.frequency.value = 620;

        f.type = 'lowpass';
        f.frequency.value = 1400;

        g.gain.value = 0.0001;

        const o2 = audio.createOscillator();
        o2.type = 'sine';
        o2.frequency.value = 880;

        const g2 = audio.createGain();
        g2.gain.value = 0.0001;

        const master = audio.createGain();
        master.gain.value = 0.12;

        o.connect(f);
        f.connect(g);
        g.connect(master);

        o2.connect(g2);
        g2.connect(master);
        master.connect(audio.destination);

        const now = audio.currentTime;
        o.start(now);
        o2.start(now);

        // Gentle swell + decay
        g.gain.setValueAtTime(0.0001, now);
        g.gain.linearRampToValueAtTime(0.08, now + 0.06);
        g.gain.linearRampToValueAtTime(0.0001, now + 1.1);

        g2.gain.setValueAtTime(0.0001, now + 0.08);
        g2.gain.linearRampToValueAtTime(0.035, now + 0.14);
        g2.gain.linearRampToValueAtTime(0.0001, now + 0.9);

        o.stop(now + 1.4);
        o2.stop(now + 1.2);
      } catch (e) {}
    }

    // Handle clicking the revealed (right) card to redraw
    function handleDrawnCardClick() {
      const cardEl = document.getElementById('oracle-card');

      if (!hasDrawn) {
        drawCard();
      } else {
        // Clicking the revealed card on the right draws a fresh one
        drawCard(true);
      }
    }

    function copyMessage() {
      if (!currentCard) return;

      const text = `${currentCard.name} — ${currentCard.keyword}\n\n${currentCard.daily}\n\n${currentCard.essence}`;
      
      navigator.clipboard.writeText(text).then(() => {
        const originalText = event.target?.innerText || '';
        const btns = document.querySelectorAll('#interpretation button');
        
        btns.forEach(btn => {
          if (btn.innerText.includes('SAVE') || btn.innerText.includes('MESSAGE')) {
            const original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-check text-xs"></i> <span>COPIED</span>`;
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
              btn.innerHTML = original;
              btn.style.pointerEvents = '';
            }, 1600);
          }
        });
      }).catch(() => {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('Message copied to clipboard.');
      });
    }

    // Keyboard support
    function initKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          const card = document.getElementById('oracle-card');
          if (document.activeElement.tagName === 'BUTTON') return;
          
          e.preventDefault();
          if (!hasDrawn) {
            drawCard();
          } else {
            drawCard(true);
          }
        }
        
        if (e.key.toLowerCase() === 'r' && hasDrawn) {
          drawCard(true);
        }
      });

      // Hint
      const hint = document.createElement('div');
      hint.className = 'hidden md:block fixed bottom-5 right-5 text-[10px] text-[#5c5344]';
      hint.innerHTML = 'Press <span class="font-mono bg-[#16132a] px-1.5 py-px rounded">SPACE</span> or <span class="font-mono bg-[#16132a] px-1.5 py-px rounded">R</span> to redraw';
      document.body.appendChild(hint);
    }

    // Subtle entrance animation for the cards on load
    function initEntrance() {
      const rightCard = document.getElementById('oracle-card');
      const leftCard = document.getElementById('deck-card');

      // Right card (the one that will flip)
      if (rightCard) {
        rightCard.style.opacity = '0';
        rightCard.style.transform = 'translateY(22px)';

        setTimeout(() => {
          rightCard.style.transition = 'all 0.75s cubic-bezier(0.23, 1.0, 0.32, 1)';
          rightCard.style.opacity = '1';
          rightCard.style.transform = 'translateY(0)';
        }, 320);
      }

      // Left deck card - slightly earlier, more subtle
      if (leftCard) {
        leftCard.style.opacity = '0';
        leftCard.style.transform = 'translateY(16px) scale(0.985)';

        setTimeout(() => {
          leftCard.style.transition = 'all 0.65s cubic-bezier(0.23, 1.0, 0.32, 1)';
          leftCard.style.opacity = '1';
          leftCard.style.transform = 'translateY(0) scale(1)';
        }, 180);
      }
    }

    // Initialize everything
    function init() {
      initTailwind();
      setTodayDate();
      initKeyboard();
      initEntrance();

      // Optional: pre-load a tiny hint that the right card is interactive
      setTimeout(() => {
        const rightCard = document.getElementById('oracle-card');
        if (rightCard && !hasDrawn) {
          rightCard.style.boxShadow = '0 25px 70px -15px rgb(0 0 0 / 0.5), 0 10px 30px -10px rgb(0 0 0 / 0.4), 0 0 0 1px rgba(201,163,107,0.15)';
        }
      }, 1400);
    }

    // Boot
    window.onload = init;
  </script>
</body>
</html>
